<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flynova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400..700;1,100..900&display=swap"

    <link rel="stylesheet" href="../CSS/macotas.css">

<body>
    <header class="header">
        <div id="inicio" class="container_logo">
            <a href="../index.html"><img class="logo_flynova" src="../Assets/compartidos/Logos/logo flynova gris.png"
                    alt="Logo flynova"></a>
        </div>
        <div class="container_botones_header">
            <div class="boton_moneda">
                <img src="../Assets/compartidos/imagenes/circulo_colombia.png" alt="imagen de bandera del pais">
                COP - $
            </div>
            <button class="boton_iniciar_sesion">
                <p>Inisiar sesión</p>
                <img class="icono_user" src="../Assets/compartidos/iconos/user.svg" alt="icono de user">
            </button>
        </div>
    </header>
    <div class="separacion">
    </div>




    <footer>
        <div class="logo-redes">
            <img src="../Assets/compartidos/Logos/logo flynova gris.png" alt="">

            <div class="redes">
                <p>¡Siguenos!</p>
                <div>
                    <img src="../Assets/compartidos/iconos/facebook.svg" alt="">
                    <img src="../Assets/compartidos/iconos/instagram.svg"">
                    <img src="../Assets/compartidos/iconos/x.svg" alt="">
                    <img src="../Assets/compartidos/iconos/youtube.svg" alt="">

        </div>
        <div class="container-contacto-secciones-servicios">

                <h3>Información de contacto</h3>
                <p>Teléfono: +34 91 123 45 67 </p>
                <p>Correo electrónico: infoflynova@gmail.co</p>
            </div>
            <div class="secciones">
                <h3>Secciones</h3>
                <p>Inicio</p>
                <p>Ofertas</p>
                <p>Paquetes</p>
                <p>Rankings</p>
                <p>Servicios</p>
                <p>Sobre Nosotros</p>
            </div>
            <div class="servicios">
                <h3>Servicios</h3>
                <p>Comida para tu viaje</p>
                <p>Alquila un coche</p>
                <p>Reserva un hotel</p>
            </div>
        </div>
    </footer>

</html>
