<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flynova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400..700;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../CSS/busqueda_de_vuelos.css">
</head>

<body>
    <header class="header">
        <div id="inicio" class="container_logo">
            <a href="../index.html"><img class="logo_flynova" src="../Assets/compartidos/Logos/logo flynova gris.png"
                    alt="Logo flynova"></a>
        </div>
        <div class="container_botones_header">
            <div class="boton_moneda">
                <img src="../Assets/compartidos/imagenes/circulo_colombia.png" alt="imagen de bandera del pais">
                COP - $
            </div>
            <button class="boton_iniciar_sesion">
                <p>Inisiar sesión</p>
                <img class="icono_user" src="../Assets/compartidos/iconos/user.svg" alt="icono de user">
            </button>
        </div>
    </header>
    <div class="separacion">
    </div>
    <main>
        <form action="">
            <div class="container-busqueda">
                <div class="vuelo-ida">
                    <img src="../Assets/compartidos/iconos/avion despegando1.svg" alt="">
                    <input list="ciudades" value="Bogotá">
                    <datalist id="ciudades">
                        <option value="Medellín"></option>
                        <option value="Pereira"></option>
                        <option value="Bogotá"></option>
                    </datalist>
                </div>
                <div class="destino">
                    <img src="../Assets/compartidos/iconos/Avion aterrizando.svg" alt="">
                    <input list="ciudades" value="Medellín">
                    <datalist id="ciudades">
                        <option value="Medellín"></option>
                        <option value="Pereira"></option>
                        <option value="Bogotá"></option>
                    </datalist>
                </div>
                <input class="fecha" type="date">
                <div class="cantidad-personas">
                    <img src="../Assets/compartidos/iconos/user-add.svg" alt="">
                    <input type="number" min="1" value="1">
                </div>
                <button>
                    <p>Buscar</p>
                </button>
            </div>
        </form>
        <div class="container-info-viaje">
            <h1>Solo ida: Bogotá a Medellín</h1>
        </div>
        <div class="container-fechas">
            <img class="izquierda" src="../Assets/compartidos/iconos/next_linea.svg" alt="">
            <div class="dias ocultar-t">
                <p>Lun. 21 Abr</p>
                <p>COP 254.060</p>
            </div>
            <div class="dias ocultar-m">
                <p>Mar. 22 Abr</p>
                <p>COP 254.060</p>
            </div>
            <div class="dias">
                <p>Mier. 21 Abr</p>
                <p>COP 247.540</p>
            </div>
            <div class="jueves">
                <p>Lun. 23 Abr</p>
                <p>COP 239.250</p>
            </div>
            <div class="dias">
                <p>Lun. 21 Abr</p>
                <p>COP 260.100</p>
            </div>
            <div class="dias ocultar-m">
                <p>Lun. 21 Abr</p>
                <p>COP 219.430</p>
            </div>
            <div class="dias ocultar-t">
                <p>Lun. 21 Abr</p>
                <p>COP 219.430</p>
            </div>
            <img class="derecha" src="../Assets/compartidos/iconos/next_linea.svg" alt="">
        </div>
    </main>

</body>

</html>
